serial:
  port: /dev/ttyACM0
  baudrate: 115200
camera:
  index: 0
  qr_timeout_s: 30
  width: 640
  height: 480
map:
  image: maps/floorplan.png
  grid: maps/occupancy_grid.npy
  resolution_cm_per_px: 1.0
  robot_radius_cm: 4.0
  length_cm: 200
  width_cm: 200
  grid_step_cm: 50
slots:
  file: config/warehouse_slots.yaml
navigation:
  home:
  - 20
  - 20
  obstacle_stop_cm: 18.0
  obstacle_resume_cm: 25.0
  loop_hz: 10
  target_tolerance_px: 5.0
  max_mission_seconds: 180
  max_drive_speed: 90
  max_turn_speed: 90
odometry:
  enabled: false
  wheel_diameter_cm: 6.5
  wheel_base_cm: 15.0
  ticks_per_revolution: 20
  yaw_sign: 1.0
dead_reckoning:
  forward_speed_cm_per_s: 20.0
  backward_speed_cm_per_s: 18.0
  turn_speed_deg_per_s: 60.0
admin:
  host: 0.0.0.0
  port: 8080
  manual_speed: 90
  nudge_duration_s: 0.35
